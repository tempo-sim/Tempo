[CoreRedirects]
; TempoCamera, TempoLidar, TempoLabels, and TempoSensorsShared collapsed into
; TempoSensors in v2. PackageRedirects let existing user assets resolve the
; UClasses (UTempoCamera, UTempoLidar, UTempoActorLabeler, etc.) that
; previously lived in those modules.
+PackageRedirects=(OldName="/Script/TempoCamera",NewName="/Script/TempoSensors")
+PackageRedirects=(OldName="/Script/TempoLidar",NewName="/Script/TempoSensors")
+PackageRedirects=(OldName="/Script/TempoLabels",NewName="/Script/TempoSensors")
+PackageRedirects=(OldName="/Script/TempoSensorsShared",NewName="/Script/TempoSensors")
