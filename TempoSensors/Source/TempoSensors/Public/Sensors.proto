syntax = "proto3";

import "TempoSensors/Camera.proto";
import "TempoSensors/Lidar.proto";

enum MeasurementType {
  COLOR_IMAGE = 0;
  DEPTH_IMAGE = 1;
  LABEL_IMAGE = 2;
  LIDAR_SCAN = 3;
  BOUNDING_BOXES = 4;
  VIDEO = 5;
}

message SensorDescriptor {
  string owner = 1;
  string name = 2;
  float rate = 3;
  repeated MeasurementType measurement_types = 4;
}

message AvailableSensorsRequest {

}

message AvailableSensorsResponse {
  repeated SensorDescriptor available_sensors = 1;
}

service SensorService {
  rpc GetAvailableSensors(AvailableSensorsRequest) returns (AvailableSensorsResponse);

  rpc StreamColorImages(TempoSensors.ColorImageRequest) returns (stream TempoSensors.ColorImage);

  rpc StreamDepthImages(TempoSensors.DepthImageRequest) returns (stream TempoSensors.DepthImage);

  rpc StreamLabelImages(TempoSensors.LabelImageRequest) returns (stream TempoSensors.LabelImage);

  rpc StreamBoundingBoxes(TempoSensors.BoundingBoxesRequest) returns (stream TempoSensors.BoundingBoxes);

  rpc StreamLidarScans(TempoSensors.LidarScanRequest) returns (stream TempoSensors.LidarScanSegment);

  rpc StreamVideo(TempoSensors.VideoRequest) returns (stream TempoSensors.VideoFrame);
}
