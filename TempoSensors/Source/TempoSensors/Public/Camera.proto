syntax = "proto3";

import "TempoSensors/Common.proto";

enum ImageCompressionLevel {
  ICL_UNKNOWN = 0;
  ICL_MIN = 1;
  ICL_LOW = 2;
  ICL_MID = 3;
  ICL_HIGH = 4;
  ICL_MAX = 5;
}

enum ColorEncoding {
  CE_UNKNOWN = 0;
  CE_BGR8 = 1;
  CE_RGB8 = 2;
}

message ColorImage {
  TempoSensors.MeasurementHeader header = 1;
  // Image width in pixels.
  uint32 width_px = 2;
  // Image height in pixels.
  uint32 height_px = 3;
  // Raw bytes of an encoded image file (PNG/JPEG/etc depending on compression).
  bytes data = 4;
  ColorEncoding encoding = 5;
}

message DepthImage {
  TempoSensors.MeasurementHeader header = 1;
  // Image width in pixels.
  uint32 width_px = 2;
  // Image height in pixels.
  uint32 height_px = 3;
  // Depth along the camera axis for every pixel, in meters. Row-major, width_px * height_px entries.
  repeated float depths_m = 4;
}

message LabelImage {
  TempoSensors.MeasurementHeader header = 1;
  // Image width in pixels.
  uint32 width_px = 2;
  // Image height in pixels.
  uint32 height_px = 3;
  // 8-bit instance label for every pixel. Row-major, width_px * height_px entries.
  bytes data = 4;
}

message BoundingBox2D {
  // Top-left X in pixels.
  uint32 min_x_px = 1;
  // Top-left Y in pixels.
  uint32 min_y_px = 2;
  // Bottom-right X in pixels.
  uint32 max_x_px = 3;
  // Bottom-right Y in pixels.
  uint32 max_y_px = 4;
  // Instance ID from the matching label image (1-255).
  uint32 instance_id = 5;
  // Semantic class ID.
  uint32 semantic_id = 6;
}

message BoundingBoxes {
  TempoSensors.MeasurementHeader header = 1;
  // Source image width in pixels (for coordinate reference).
  uint32 width_px = 2;
  // Source image height in pixels (for coordinate reference).
  uint32 height_px = 3;
  repeated BoundingBox2D bounding_boxes = 4;
}

message ColorImageRequest {
  // Name of the actor that owns the sensor.
  string owner = 1;
  // Name of the sensor component on the owning actor.
  string sensor = 2;
  ImageCompressionLevel compression_level = 3;
}

message DepthImageRequest {
  // Name of the actor that owns the sensor.
  string owner = 1;
  // Name of the sensor component on the owning actor.
  string sensor = 2;
}

message LabelImageRequest {
  // Name of the actor that owns the sensor.
  string owner = 1;
  // Name of the sensor component on the owning actor.
  string sensor = 2;
}

message BoundingBoxesRequest {
  // Name of the actor that owns the sensor.
  string owner = 1;
  // Name of the sensor component on the owning actor.
  string sensor = 2;
}
