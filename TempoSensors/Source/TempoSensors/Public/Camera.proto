syntax = "proto3";

import "TempoSensors/Common.proto";

enum ImageCompressionLevel {
  MIN = 0;
  LOW = 1;
  MID = 2;
  HIGH = 3;
  MAX = 4;
}

enum ColorEncoding {
  BGR8 = 0;
  RGB8 = 1;
}

message ColorImage {
  TempoSensors.MeasurementHeader header = 1;
  uint32 width = 2;
  uint32 height = 3;
  bytes data = 4; // Raw bytes of an image file
  ColorEncoding encoding = 5;
}

message DepthImage {
  TempoSensors.MeasurementHeader header = 1;
  uint32 width = 2;
  uint32 height = 3;
  repeated float depths = 4; // Depth along camera axis in cm of every pixel
}

message LabelImage {
  TempoSensors.MeasurementHeader header = 1;
  uint32 width = 2;
  uint32 height = 3;
  bytes data = 4; // 0-255 label for every pixel
}

message BoundingBox2D {
  uint32 min_x = 1;  // Top-left corner X coordinate in pixels
  uint32 min_y = 2;  // Top-left corner Y coordinate in pixels
  uint32 max_x = 3;  // Bottom-right corner X coordinate in pixels
  uint32 max_y = 4;  // Bottom-right corner Y coordinate in pixels
  uint32 instance_id = 5;  // Instance ID from label image (1-255)
  uint32 semantic_id = 6;  // Semantic class ID
}

message BoundingBoxes {
  TempoSensors.MeasurementHeader header = 1;
  uint32 width = 2;   // Image width for coordinate reference
  uint32 height = 3;  // Image height for coordinate reference
  repeated BoundingBox2D bounding_boxes = 4;
}

message ColorImageRequest {
  string owner_name = 1;
  string sensor_name = 2;
  ImageCompressionLevel compression_level = 3;
}

message DepthImageRequest {
  string owner_name = 1;
  string sensor_name = 2;
}

message LabelImageRequest {
  string owner_name = 1;
  string sensor_name = 2;
}

message BoundingBoxesRequest {
  string owner_name = 1;
  string sensor_name = 2;
}

enum VideoCodec {
  H264 = 0;
}

enum H264Profile {
  H264_BASELINE = 0;
  H264_MAIN = 1;
  H264_HIGH = 2;
}

// Encoded video frame. Lossy and not bit-deterministic across runs — use ColorImage if you need
// raw pixels (e.g. for ML data generation or regression testing).
message VideoFrame {
  TempoSensors.MeasurementHeader header = 1;
  uint32 width = 2;
  uint32 height = 3;
  // Annex-B NAL units. SPS+PPS are prepended on key (IDR) frames so a client that joins mid-stream
  // can decode starting from the next key frame without a separate parameter-set handshake.
  bytes data = 4;
  bool key_frame = 5;
  VideoCodec codec = 6;
}

message VideoRequest {
  string owner_name = 1;
  string sensor_name = 2;
  VideoCodec codec = 3;
  // 0 = use default (chosen per resolution; ~8000 for 1080p).
  uint32 bitrate_kbps = 4;
  // Frames between IDRs. 0 = use default (30). Lower values reduce join latency at the cost of bitrate.
  uint32 keyframe_interval = 5;
  // Only used when codec == H264.
  H264Profile profile = 6;
}
