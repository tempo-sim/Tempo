syntax = "proto3";

import "TempoCore/Empty.proto";
import "TempoCore/Geometry.proto";

message CommandableVehiclesResponse{
  repeated string vehicle_name = 1;
}

// Open-loop driving input. Acceleration and steering are normalized to [-1, 1].
message NormalizedDrivingCommand {
  string vehicle_name = 1;
  float acceleration = 2;
  float steering = 3;
}

// Closed-loop velocity command. Twist is in the vehicle body frame:
// linear x forward, linear y to the right, angular z is yaw rate (right-handed, m/s and rad/s).
message VelocityCommand {
  string vehicle_name = 1;
  TempoCore.Twist twist = 2;
}

// Closed-loop acceleration command. Same frame and conventions as VelocityCommand,
// but in m/s^2 and rad/s^2.
message AccelerationCommand {
  string vehicle_name = 1;
  TempoCore.Accel accel = 2;
}

message CommandablePawnsResponse {
  repeated string pawn_name = 1;
}

message PawnMoveToLocationRequest {
  string name = 1;
  TempoCore.Vector location = 2;
  bool relative = 3;
}

enum MoveToResult {
  UNKNOWN = 0;
  SUCCESS = 1;
  BLOCKED = 2;
  OFF_PATH = 3;
  ABORTED = 4;
  INVALID = 5;
}

message PawnMoveToLocationResponse {
  MoveToResult result = 1;
}

service MovementControlService {
  rpc GetCommandableVehicles(TempoCore.Empty) returns (CommandableVehiclesResponse);

  rpc CommandVehicle(NormalizedDrivingCommand) returns (TempoCore.Empty);

  rpc CommandVelocity(VelocityCommand) returns (TempoCore.Empty);

  rpc CommandAcceleration(AccelerationCommand) returns (TempoCore.Empty);

  rpc GetCommandablePawns(TempoCore.Empty) returns (CommandablePawnsResponse);

  rpc PawnMoveToLocation(PawnMoveToLocationRequest) returns (PawnMoveToLocationResponse);

  rpc RebuildNavigation(TempoCore.Empty) returns (TempoCore.Empty);
}
