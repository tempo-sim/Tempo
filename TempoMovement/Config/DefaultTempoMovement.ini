[CoreRedirects]
; TempoVehicleMovement, TempoVehicleControl, and TempoMovementShared collapsed
; into TempoMovement in v2.
+PackageRedirects=(OldName="/Script/TempoVehicleMovement",NewName="/Script/TempoMovement")
+PackageRedirects=(OldName="/Script/TempoVehicleControl",NewName="/Script/TempoMovement")
+PackageRedirects=(OldName="/Script/TempoMovementShared",NewName="/Script/TempoMovement")
+ClassRedirects=(OldName="/Script/TempoMovement.TempoVehicleController",NewName="/Script/TempoMovement.TempoWheeledVehicleController")
; TeleportMovementComponent moved from TempoAgents to TempoMovement in v2.
+ClassRedirects=(OldName="/Script/TempoAgents.TeleportMovementComponent",NewName="/Script/TempoMovement.TeleportMovementComponent")
