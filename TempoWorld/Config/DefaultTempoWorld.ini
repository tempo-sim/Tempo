[CoreRedirects]
; ActorControl renamed to WorldControl in v2 (file, service, and subsystem class).
; This redirect lets existing user assets that reference UTempoActorControlServiceSubsystem
; resolve to the renamed class.
+ClassRedirects=(OldName="/Script/TempoWorld.TempoActorControlServiceSubsystem",NewName="/Script/TempoWorld.TempoWorldControlServiceSubsystem")
