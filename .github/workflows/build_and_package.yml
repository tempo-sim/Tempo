# ======
# Build and Package Workflow for a Tempo Unreal project.
# This workflow builds and packages an Unreal project using Tempo.
# If the project is not very large it can run on a GitHub-hosted runner.
# It relies on the Epic-distributed Unreal images (github.com/orgs/EpicGames/packages/container/package/unreal-engine)
# **Note**: A workflow must have EPIC_DOCKER_USERNAME and EPIC_DOCKER_TOKEN secrets to call this workflow. Same-org
#           callers can pass them (and submodules_app_private_key) via 'secrets: inherit'. Callers in a DIFFERENT org
#           must pass them explicitly under 'secrets:', since 'secrets: inherit' does not cross org boundaries. Please
#           see the instructions here to obtain a token:
#           https://dev.epicgames.com/documentation/en-us/unreal-engine/quick-start-guide-for-using-container-images-in-unreal-engine
# **Note**: The pre-modded image (engine_mods_image) is pulled from ghcr.io by default using the GITHUB_TOKEN. To pull
#           from another registry, set engine_mods_image to the target host and either pass registry/registry_username
#           + the registry_password secret (static-credential registries), or set aws_region (+ aws_role_to_assume for
#           OIDC, or the aws_access_key_id/aws_secret_access_key secrets) for AWS ECR. When using OIDC, the calling job
#           must grant 'id-token: write'. The Epic *base* image is always pulled from ghcr.io regardless.
# Unreal is a large (>40gb) dependency and packaging is resource-intensive. To deal with these constraints the workflow
# uses a few non-standard techniques:
# - We free space on the runner's main filesystem before starting by removing unnecessary packages. This gives us space
#   to build and package the project. However this is still not enough space to store Unreal, so the Unreal docker
#   container is stored on the /mnt filesystem, which has considerably more free space.
# - We cache two types of artifacts to speed up builds:
#   - The Tempo Unreal "Engine Mods", which are parts of the engine Tempo modifies in-place. Since the engine lives in
#     the Docker container, but we want to cache our modifications to it, we "initialize" the .engine-mods-cache
#     directory, which we will cache, with the vanilla engine before attempting to modify it.
#   - The results of the nearest build on the main branch, including the Engine's DerivedDataCache folder, where some
#     cooked artifacts are stored and which is "initialized" in the same way as the engine mods cache above (except in
#     the .engine-ddc-cache directory). This cache speeds up the build and package steps substantially.
# - Since the project and Tempo source files, and any restored cached files, will be mounted in the docker container
#   in order to build the project there, we change their permissions to the match those of the user in the container.
# - Git does not store file timestamps, so the modification timestamps of the source files will be the time they were
#   checked out (during a run of this workflow). This will invalidate the build cache. So we overwrite the modification
#   timestamps with the time the files were committed.
# ======

name: Build and Package an Unreal Project Using Tempo

on:
  workflow_call:
    inputs:
      clean:
        type: boolean
        description: Clean before Build
        default: false
      package:
        type: boolean
        description: Package
        default: true
      automation_test_filter:
        type: string
        description: If non-empty, run the Unreal automation tests whose names match this filter (e.g. "Tempo." or your own project's group) after building, failing the job on any test failure. Empty (default) skips testing.
        default: ''
      platform:
        type: string
        description: Which platform to build for (ubuntu-22.04 and ubuntu-24.04 are supported)
        default: ubuntu-22.04
      unreal_version:
        type: string
        description: Which Unreal version to build for (5.6, and 5.7 are supported)
        default: 5.7
      project_root:
        type: string
        description: Root of your project's repo
        default: ${{ github.event.repository.name }}
      tempo_root:
        type: string
        description: Root of the Tempo folder
        default: ${{ github.event.repository.name }}/Plugins/Tempo
      host_project:
        type: string
        description: A "host" project repo to checkout, if the workflow is being used for a plugin
        default: ''
      checkout_path:
        type: string
        description: The path in the workspace to use for checkout
        default: ${{ github.event.repository.name }}
      cache_repo_root:
        type: string
        description: Root of the repo which should be used for the build cache
        default: ${{ github.event.repository.name }}
      cache_branch:
        type: string
        description: Branch that should be used to populate the build cache
        default: main
      release_id:
        type: string
        description: ID to use for the uploaded release, or the ID of the release to use as the base of a patch
        default: ${{ github.sha }}
      patch:
        type: boolean
        description: Whether to create a patch from a release
        default: false
      maps:
        type: string
        description: Which maps to include in package (syntax "map1+map2+map3")
        default: ''
      upload_artifact:
        type: boolean
        description: Upload release or patch as a GitHub artifact
        default: false
      upload_artifact_compression_level:
        type: string
        description: Uploaded artifact compression level (refer to github.com/actions/upload-artifact)
        default: '6'
      environment:
        type: string
        description: Environment to deploy to (optional, default None)
        required: false
        default: ""
      engine_mods_image:
        type: string
        description: Registry repo (without tag, including the host) of a pre-modded Tempo Unreal image (see publish_engine_mods.yml). If empty or pull fails, falls back to building the image and applying engine mods in-workflow.
        default: ""
      post_checkout_script:
        type: string
        description: Path (relative to project_root) of a script to run on the host after checkout, e.g. to download third-party dependencies into the project tree
        default: ''
      submodules_token:
        type: string
        description: Token to use for fetching submodules during checkout
        default: ''
      submodules_app_id:
        type: string
        description: GitHub App ID used to mint a token for fetching private submodules during checkout (alternative to submodules_token). Requires the submodules_app_private_key secret. Minting happens in this job, so it works across the reusable-workflow boundary where a token passed via submodules_token cannot (GitHub strips token-shaped values from job outputs).
        default: ''
      submodules_repositories:
        type: string
        description: Comma- or newline-separated repos to scope the minted submodules token to (default - all repos in the App installation). Only used when submodules_app_id is set.
        default: ''
      gen_rust_api:
        type: boolean
        description: Generate the Tempo Rust API during the build (sets TEMPO_GEN_RUST_API=1 in the container)
        default: false
      gen_cpp_api:
        type: boolean
        description: Generate the Tempo C++ API during the build (sets TEMPO_GEN_CPP_API=1 in the container)
        default: false
      registry:
        type: string
        description: Registry host to authenticate to for pulling the pre-modded image (static-credential registries only, e.g. ghcr.io or docker.io). Must match the host in engine_mods_image. Ignored when aws_region is set (ECR).
        default: ghcr.io
      registry_username:
        type: string
        description: Username for static-credential registry login. Defaults to the triggering actor (correct for ghcr.io).
        default: ${{ github.actor }}
      aws_region:
        type: string
        description: If set, authenticate to AWS ECR in this region (instead of a static-credential login) to pull the pre-modded image. Provide aws_role_to_assume (OIDC) or the aws_access_key_id/aws_secret_access_key secrets. The caller's job must grant id-token-write permission when using OIDC.
        default: ''
      aws_role_to_assume:
        type: string
        description: IAM role ARN to assume via GitHub OIDC for ECR auth. Takes precedence over the access-key secrets when both are provided.
        default: ''
    secrets:
      submodules_app_private_key:
        description: Private key (PEM) for the GitHub App identified by submodules_app_id. Required only when submodules_app_id is set.
        required: false
      EPIC_DOCKER_USERNAME:
        description: Username for pulling the Epic-distributed Unreal base image from ghcr.io. Declared so cross-org callers (which cannot inherit secrets) can pass it explicitly.
        required: false
      EPIC_DOCKER_TOKEN:
        description: Token for pulling the Epic-distributed Unreal base image from ghcr.io. Declared so cross-org callers (which cannot inherit secrets) can pass it explicitly.
        required: false
      registry_password:
        description: Password/token for static-credential registry login. If empty, falls back to the GITHUB_TOKEN (correct for ghcr.io).
        required: false
      aws_access_key_id:
        description: AWS access key ID for ECR auth (used when aws_region is set and aws_role_to_assume is empty).
        required: false
      aws_secret_access_key:
        description: AWS secret access key for ECR auth (used when aws_region is set and aws_role_to_assume is empty).
        required: false

env:
  UNREAL_VERSION: "${{ inputs.unreal_version }}"

jobs:
  build:
    name: Build and Package Project
    runs-on: ${{ inputs.platform }}
    environment: ${{ inputs.environment != '' && inputs.environment || null }}
    concurrency:
      group: ${{ github.workflow }}-${{ github.event.pull_request.head.sha || github.sha }}-${{ inputs.platform }}-${{ inputs.unreal_version }}
      cancel-in-progress: true
    steps:
    - name: Validate Inputs
      run: |
        case "${{ inputs.platform }}" in
          "ubuntu-22.04"|"ubuntu-24.04") ;;
          *)
            echo "Error: Invalid platform. Only ubuntu-22.04 and ubuntu-24.04 are supported."
            exit 1
            ;;
        esac
        case "${{ inputs.unreal_version }}" in
          "5.6"|"5.7") ;;
          *)
            echo "Error: Invalid Unreal Version. Only 5.6, and 5.7 are supported."
            exit 1
            ;;
        esac
        if [ "${{ inputs.patch }}" = "true" ]; then
          if [ "${{ ! inputs.package }}" = "true" ]; then
            echo "Error: Requested to create a patch but package is false."
            exit 1
          fi
        fi
        if [ "${{ inputs.upload_artifact }}" = "true" ]; then
          if [ "${{ ! inputs.package }}" = "true" ]; then
            echo "Error: Requested to upload artifact but package is false."
            exit 1
          fi
        fi
    - name: Free Disk Space (if using GitHub-hosted runner)
      if: ${{ contains(runner.name, 'Github') && contains(runner.name, 'Actions') }}
      uses: jlumbroso/free-disk-space@main
      with:
        tool-cache: true
        android: true
        dotnet: true
        haskell: true
        large-packages: true
        docker-images: true
        swap-storage: true
    - name: Free Additional Disk Space (if using GitHub-hosted runner)
      if: ${{ contains(runner.name, 'Github') && contains(runner.name, 'Actions') }}
      run: |
        # Remove large preinstalled toolchains that jlumbroso/free-disk-space does not cover.
        # None are used by the Unreal build. Each path is removed best-effort.
        df -h /
        sudo rm -rf /usr/share/swift || true                                   # ~3G
        sudo rm -rf /usr/local/share/powershell || true                        # ~1.2G
        sudo rm -rf /usr/local/share/chromium /opt/google /opt/microsoft || true  # browsers, ~2G
        sudo rm -rf /usr/local/lib/node_modules || true                        # ~1G
        df -h /
    - name: Free Space in /mnt (if using GitHub-hosted runner)
      if: ${{ contains(runner.name, 'Github') && contains(runner.name, 'Actions') }}
      run: |
        # Newer runner images no longer mount a separate resource disk at /mnt; it is just a
        # directory on the root volume, so there is nothing to free here. Only act when /mnt is
        # its own filesystem (older runner images).
        if mountpoint -q /mnt; then
          ls -la /mnt || true
          df -h /mnt
          sudo rm -rf /mnt/btrfs_loopbacks || true
          sudo rm -rf /mnt/var-lib-docker || true
          df -h /mnt
        else
          echo "/mnt is not a separate filesystem on this runner; nothing to free."
        fi
    - name: Checkout Host Project (if using one)
      if: ${{ inputs.host_project != '' }}
      uses: actions/checkout@v4
      with:
        repository: ${{ inputs.host_project }}
        path: ${{ github.workspace }}/${{ inputs.project_root }}
        ref: main
        fetch-depth: 0
        submodules: recursive
    - name: Mint Submodules Token (GitHub App)
      id: submodules_app_token
      if: ${{ inputs.submodules_app_id != '' }}
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ inputs.submodules_app_id }}
        private-key: ${{ secrets.submodules_app_private_key }}
        owner: ${{ github.repository_owner }}
        repositories: ${{ inputs.submodules_repositories }}
    - name: Checkout
      uses: actions/checkout@v4
      with:
        path: ${{ inputs.checkout_path }}
        ref: ${{ github.event.pull_request.head.sha || github.sha }}
        fetch-depth: 0
        submodules: recursive
        token: ${{ steps.submodules_app_token.outputs.token != '' && steps.submodules_app_token.outputs.token || (inputs.submodules_token != '' && inputs.submodules_token || github.token) }}
    - name: Report Free Space (after checkout)
      run: df -h /
    - name: Find Common Ancestor with Base Branch
      if: ${{ ! inputs.clean }}
      id: common_ancestor
      run: |
        cd ${{ github.workspace }}/${{ inputs.cache_repo_root }} && echo "COMMON_ANCESTOR=$(git merge-base HEAD origin/$BASE_BRANCH)" >> $GITHUB_OUTPUT
      env:
        BASE_BRANCH: ${{ inputs.cache_branch }}
    - name: Get Lowercase Repo Name
      id: repo_lowercase
      run: |
        echo "REPO_LOWERCASE=${REPO_UPPERCASE,,}" >> $GITHUB_OUTPUT
      env:
        REPO_UPPERCASE: ${{ github.event.repository.name }}
    - name: Restore Build Cache (if clean not specified)
      if: ${{ ! inputs.clean }}
      id: restore_build_cache
      uses: actions/cache/restore@v4
      with:
        path: |
          ${{ github.workspace }}/${{ inputs.project_root }}/**/*.pb.cc
          ${{ github.workspace }}/${{ inputs.project_root }}/**/*.pb.h
          ${{ github.workspace }}/${{ inputs.project_root }}/Binaries/**
          ${{ github.workspace }}/${{ inputs.project_root }}/Intermediate/**
          ${{ github.workspace }}/${{ inputs.project_root }}/DerivedDataCache/**
          ${{ github.workspace }}/${{ inputs.project_root }}/Saved/**
          ${{ github.workspace }}/${{ inputs.project_root }}/Plugins/**/Intermediate/**
          ${{ github.workspace }}/${{ inputs.project_root }}/Plugins/**/Binaries/**
          .engine-ddc-cache/**
        key: ${{ steps.repo_lowercase.outputs.REPO_LOWERCASE }}-build-${{ env.UNREAL_VERSION }}-${{ steps.common_ancestor.outputs.COMMON_ANCESTOR }}
    - name: Restore Engine Mods Cache (if clean not specified and not using pre-modded image)
      if: ${{ ! inputs.clean && inputs.engine_mods_image == '' }}
      id: restore_engine_mods_cache
      uses: actions/cache/restore@v4
      with:
        path: |
          .engine-mods-cache/TempoMods/**
          .engine-mods-cache/Engine/Plugins/Runtime/ZoneGraph/**
          .engine-mods-cache/Engine/Plugins/PCG/**
          .engine-mods-cache/Engine/Plugins/Editor/EditorScriptingUtilities/**
          .engine-mods-cache/Engine/Plugins/Runtime/ComputeFramework/**
          .engine-mods-cache/Engine/Plugins/AI/MassCrowd/**
          .engine-mods-cache/Engine/Plugins/Runtime/MassEntity/**
          .engine-mods-cache/Engine/Plugins/Runtime/StateTree/**
          .engine-mods-cache/Engine/Source/Programs/UnrealBuildTool/**
          .engine-mods-cache/Engine/Source/Programs/AutomationTool/**
          .engine-mods-cache/Engine/Source/Programs/Shared/**
          .engine-mods-cache/Engine/Binaries/DotNET/UnrealBuildTool/**
          .engine-mods-cache/Engine/Binaries/DotNET/AutomationTool/**
        key: tempo-engine-mods-${{ env.UNREAL_VERSION }}-${{ hashFiles(format('{0}/EngineMods/**', inputs.tempo_root)) }}
    - name: Run Post-Checkout Script (if specified)
      if: ${{ inputs.post_checkout_script != '' }}
      working-directory: ${{ github.workspace }}/${{ inputs.project_root }}
      run: |
        bash "${{ inputs.post_checkout_script }}"
    - name: Fixup Source File Modification Timestamps and Permissions
      run: |
        # The modification timestamps are recreated on checkout. This overwrites them with their respective commit dates
        # so that the cached results in the Intermediate folder will be considered valid during the build.
        cd ${{ github.workspace }}/${{ inputs.project_root }}
        git ls-files | while read file; do
          timestamp=$(git log -1 --format=%cd --date=iso "$file")
          touch -d "$timestamp" "$file"
        done
        # Same for Tempo source files
        cd ${{ github.workspace }}/${{ inputs.tempo_root }}
        git ls-files | while read file; do
          timestamp=$(git log -1 --format=%cd --date=iso "$file")
          touch -d "$timestamp" "$file"
        done
        # Set the permissions of the source files such that they can be accessed in the docker container.
        sudo chown -R 1000:1000 ${{ github.workspace }}/${{ inputs.project_root }}
        sudo chmod -R 755 ${{ github.workspace }}/${{ inputs.project_root }}
    - name: Download Base Release (if creating a patch)
      if: ${{ inputs.patch }}
      uses: dawidd6/action-download-artifact@v7
      with:
        name: ${{ format('{0}-{1}-{2}-{3}', github.event.repository.name, inputs.platform, inputs.unreal_version, inputs.release_id) }}
        search_artifacts: true
        path: .base_release
    - name: Extract Base Release Paks (if creating a patch)
      if: ${{ inputs.patch }}
      run: |
        ${{ github.workspace }}/${{ inputs.tempo_root }}/Scripts/ExtractReleasePaks.sh ${{ github.workspace }}/.base_release ${{ github.workspace }}/.releases/${{ inputs.release_id }} ${{ github.workspace }}/.base_release/Metadata
    - name: Relocate Docker Daemon Data Root (if using GitHub-hosted runner)
      if: ${{ contains(runner.name, 'Github') && contains(runner.name, 'Actions') }}
      run: |
        # Credit to https://github.com/orgs/community/discussions/26357
        # Older runner images mounted a separate, larger resource disk at /mnt, so we told docker
        # to store images there instead of on the smaller root volume. Newer images have a single
        # large root volume and no separate /mnt, in which case relocating buys nothing (it would
        # just be another directory on the same disk) and costs a docker restart, so skip it.
        if ! mountpoint -q /mnt; then
          echo "/mnt is not a separate filesystem on this runner; leaving docker data-root on /."
          exit 0
        fi
        DOCKER_DATA_ROOT='/mnt/var/lib/docker'
        DOCKER_DAEMON_JSON='/etc/docker/daemon.json'
        sudo mkdir -p "${DOCKER_DATA_ROOT}"
        # Make sure daemon.json exists. It seems not to in the ubuntu-24.04 image.
        # See https://github.com/actions/runner-images/issues/10697
        if [ ! -f "${DOCKER_DAEMON_JSON}" ]; then
          sudo mkdir -p "${DOCKER_DAEMON_JSON%/*}"
          echo -e "{\n}" | sudo tee "${DOCKER_DAEMON_JSON}" > /dev/null
        fi
        jq --arg dataroot "${DOCKER_DATA_ROOT}" '. + {"data-root": $dataroot}' "${DOCKER_DAEMON_JSON}" > "/tmp/docker.json.tmp"
        sudo mv "/tmp/docker.json.tmp" "${DOCKER_DAEMON_JSON}"
        sudo systemctl restart docker
    - name: Compute Engine Mods Hash
      if: ${{ inputs.engine_mods_image != '' }}
      id: engine_mods_hash
      run: |
        ENGINE_MODS_DIR="${{ github.workspace }}/${{ inputs.tempo_root }}/EngineMods"
        DOCKERFILE="${{ github.workspace }}/${{ inputs.tempo_root }}/Dockerfile"
        if [ ! -d "$ENGINE_MODS_DIR" ]; then
          echo "EngineMods directory not found at $ENGINE_MODS_DIR"
          exit 1
        fi
        if [ ! -f "$DOCKERFILE" ]; then
          echo "Dockerfile not found at $DOCKERFILE"
          exit 1
        fi
        # Must stay in sync with the matching computation in publish_engine_mods.yml.
        ENGINE_MODS_HASH=$(cd "$ENGINE_MODS_DIR" && find . -type f -print0 | sort -z | xargs -0 sha256sum | sha256sum | cut -d' ' -f1)
        DOCKERFILE_HASH=$(sha256sum "$DOCKERFILE" | cut -d' ' -f1)
        HASH=$(printf '%s\n%s\n' "$ENGINE_MODS_HASH" "$DOCKERFILE_HASH" | sha256sum | cut -d' ' -f1)
        echo "HASH=$HASH" >> $GITHUB_OUTPUT
        echo "Engine mods hash: $HASH"
    # --- Pre-modded image registry auth (generic: static credentials or AWS ECR). Independent of the
    #     Epic base-image registry (ghcr.io), which is logged into separately in the fallback path. ---
    - name: Configure AWS Credentials for ECR (OIDC)
      if: ${{ inputs.engine_mods_image != '' && inputs.aws_region != '' && inputs.aws_role_to_assume != '' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws_region }}
        role-to-assume: ${{ inputs.aws_role_to_assume }}
    - name: Configure AWS Credentials for ECR (Access Keys)
      if: ${{ inputs.engine_mods_image != '' && inputs.aws_region != '' && inputs.aws_role_to_assume == '' }}
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-region: ${{ inputs.aws_region }}
        aws-access-key-id: ${{ secrets.aws_access_key_id }}
        aws-secret-access-key: ${{ secrets.aws_secret_access_key }}
    - name: Login to Amazon ECR (for pulling pre-modded image)
      if: ${{ inputs.engine_mods_image != '' && inputs.aws_region != '' }}
      uses: aws-actions/amazon-ecr-login@v2
    - name: Login to Container Registry (static credentials, for pulling pre-modded image)
      if: ${{ inputs.engine_mods_image != '' && inputs.aws_region == '' }}
      uses: docker/login-action@v2
      with:
        registry: ${{ inputs.registry }}
        username: ${{ inputs.registry_username }}
        password: ${{ secrets.registry_password != '' && secrets.registry_password || secrets.GITHUB_TOKEN }}
    - name: Try Pull Pre-Modded Tempo Unreal Image
      if: ${{ inputs.engine_mods_image != '' }}
      id: pull_modded
      continue-on-error: true
      run: |
        TAG="${{ inputs.engine_mods_image }}:${{ env.UNREAL_VERSION }}-${{ steps.engine_mods_hash.outputs.HASH }}"
        echo "Attempting to pull $TAG"
        if docker pull "$TAG"; then
          docker tag "$TAG" tempo_unreal_image
          echo "used=true" >> $GITHUB_OUTPUT
          echo "Using pre-modded image: $TAG"
        else
          echo "Could not pull $TAG; will fall back to in-workflow build and engine mod install."
          echo "used=false" >> $GITHUB_OUTPUT
        fi
    - name: Set Engine Mods Mounts
      env:
        FALLBACK_MOUNTS: >-
          -v ${{ github.workspace }}/.engine-mods-cache/TempoMods:/home/ue4/UnrealEngine/TempoMods
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Runtime/ZoneGraph:/home/ue4/UnrealEngine/Engine/Plugins/Runtime/ZoneGraph
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/PCG:/home/ue4/UnrealEngine/Engine/Plugins/PCG
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Editor/EditorScriptingUtilities:/home/ue4/UnrealEngine/Engine/Plugins/Editor/EditorScriptingUtilities
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Runtime/ComputeFramework:/home/ue4/UnrealEngine/Engine/Plugins/Runtime/ComputeFramework
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/AI/MassCrowd:/home/ue4/UnrealEngine/Engine/Plugins/AI/MassCrowd
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Runtime/MassEntity:/home/ue4/UnrealEngine/Engine/Plugins/Runtime/MassEntity
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Runtime/StateTree:/home/ue4/UnrealEngine/Engine/Plugins/Runtime/StateTree
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Source/Programs/UnrealBuildTool:/home/ue4/UnrealEngine/Engine/Source/Programs/UnrealBuildTool
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Source/Programs/AutomationTool:/home/ue4/UnrealEngine/Engine/Source/Programs/AutomationTool
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Source/Programs/Shared:/home/ue4/UnrealEngine/Engine/Source/Programs/Shared
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Binaries/DotNET/UnrealBuildTool:/home/ue4/UnrealEngine/Engine/Binaries/DotNET/UnrealBuildTool
          -v ${{ github.workspace }}/.engine-mods-cache/Engine/Binaries/DotNET/AutomationTool:/home/ue4/UnrealEngine/Engine/Binaries/DotNET/AutomationTool
      run: |
        if [ "${{ steps.pull_modded.outputs.used }}" = "true" ]; then
          echo "ENGINE_MODS_MOUNTS=" >> $GITHUB_ENV
        else
          echo "ENGINE_MODS_MOUNTS=$FALLBACK_MOUNTS" >> $GITHUB_ENV
        fi
    - name: Log in to Epic Container Registry
      if: ${{ steps.pull_modded.outputs.used != 'true' }}
      uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: ${{ secrets.EPIC_DOCKER_USERNAME }}
        password: ${{ secrets.EPIC_DOCKER_TOKEN }}
    - name: Build Tempo Unreal Docker Image
      if: ${{ steps.pull_modded.outputs.used != 'true' }}
      run: |
        docker build --build-arg UNREAL_VERSION=${{ env.UNREAL_VERSION }} --tag 'tempo_unreal_image' -f ${{ github.workspace }}/${{ inputs.tempo_root }}/Dockerfile .
    - name: Initialize Engine Mods Cache (if not restored from cache and not using pre-modded image)
      if: ${{ steps.restore_engine_mods_cache.outputs.cache-hit != 'true' && steps.pull_modded.outputs.used != 'true' }}
      run: |
        mkdir -p .engine-mods-cache/TempoMods
        mkdir -p .engine-mods-cache/Engine/Plugins/Runtime
        mkdir -p .engine-mods-cache/Engine/Plugins/Editor
        mkdir -p .engine-mods-cache/Engine/Plugins/AI
        mkdir -p .engine-mods-cache/Engine/Source/Programs
        mkdir -p .engine-mods-cache/Engine/Binaries/DotNET
        docker create --name temp_engine tempo_unreal_image
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Plugins/Runtime/ZoneGraph ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Runtime
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Plugins/PCG ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Plugins/Editor/EditorScriptingUtilities ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Editor
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Plugins/Runtime/ComputeFramework ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Runtime
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Plugins/AI/MassCrowd ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/AI
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Plugins/Runtime/MassEntity ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Runtime
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Plugins/Runtime/StateTree ${{ github.workspace }}/.engine-mods-cache/Engine/Plugins/Runtime
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Source/Programs/UnrealBuildTool ${{ github.workspace }}/.engine-mods-cache/Engine/Source/Programs
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Source/Programs/AutomationTool ${{ github.workspace }}/.engine-mods-cache/Engine/Source/Programs
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Source/Programs/Shared ${{ github.workspace }}/.engine-mods-cache/Engine/Source/Programs
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Binaries/DotNET/UnrealBuildTool ${{ github.workspace }}/.engine-mods-cache/Engine/Binaries/DotNET
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/Binaries/DotNET/AutomationTool ${{ github.workspace }}/.engine-mods-cache/Engine/Binaries/DotNET
        docker rm temp_engine
    - name: Initialize Engine DDC Cache (if not restored from cache)
      if: ${{ steps.restore_build_cache.outputs.cache-hit != 'true' }}
      run: |
        mkdir -p .engine-ddc-cache/Engine
        docker create --name temp_engine tempo_unreal_image
        docker cp temp_engine:/home/ue4/UnrealEngine/Engine/DerivedDataCache ${{ github.workspace }}/.engine-ddc-cache/Engine
        docker rm temp_engine
    - name: Fix Engine Mods and Engine DDC Permissions
      run: |
        # Set the permissions of the engine mods and engine DDC files such that they can be accessed in the docker container.
        # .engine-mods-cache only exists in the fallback path (when no pre-modded image was used).
        if [ -d .engine-mods-cache ]; then
          sudo chown -R 1000:1000 .engine-mods-cache/
          sudo chmod -R 755 .engine-mods-cache/
        fi
        sudo chown -R 1000:1000 .engine-ddc-cache/
        sudo chmod -R 755 .engine-ddc-cache/
    - name: Sync Third Party Dependencies
      uses: nick-fields/retry@v3
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        max_attempts: 3
        retry_on: error
        timeout_seconds: 60
        command: |
          docker run --rm \
            ${ENGINE_MODS_MOUNTS} \
            -e GITHUB_TOKEN \
            -v ${{ github.workspace }}/.engine-ddc-cache/Engine/DerivedDataCache:/home/ue4/UnrealEngine/Engine/DerivedDataCache \
            -v ${{ github.workspace }}/${{ inputs.project_root }}:/home/ue4/${{ inputs.project_root }} \
            tempo_unreal_image \
            bash -c "/home/ue4/${{ inputs.tempo_root }}/Scripts/SyncDeps.sh -force && /home/ue4/${{ inputs.tempo_root }}/TempoROS/Scripts/SyncDeps.sh -force"
    - name: Install Engine Mods (if not using pre-modded image)
      if: ${{ steps.pull_modded.outputs.used != 'true' }}
      run: |
        docker run --rm \
          ${ENGINE_MODS_MOUNTS} \
          -v ${{ github.workspace }}/.engine-ddc-cache/Engine/DerivedDataCache:/home/ue4/UnrealEngine/Engine/DerivedDataCache \
          -v ${{ github.workspace }}/${{ inputs.project_root }}:/home/ue4/${{ inputs.project_root }} \
          tempo_unreal_image \
          /home/ue4/${{ inputs.tempo_root }}/Scripts/InstallEngineMods.sh
    - name: Clean (if requested)
      if: ${{ inputs.clean }}
      run: |
        docker run --rm \
          ${ENGINE_MODS_MOUNTS} \
          -v ${{ github.workspace }}/.engine-ddc-cache/Engine/DerivedDataCache:/home/ue4/UnrealEngine/Engine/DerivedDataCache \
          -v ${{ github.workspace }}/${{ inputs.project_root }}:/home/ue4/${{ inputs.project_root }} \
          tempo_unreal_image \
          /home/ue4/${{ inputs.tempo_root }}/Scripts/Clean.sh
    - name: Build
      run: |
        docker run --rm \
          ${ENGINE_MODS_MOUNTS} \
          -v ${{ github.workspace }}/.engine-ddc-cache/Engine/DerivedDataCache:/home/ue4/UnrealEngine/Engine/DerivedDataCache \
          -v ${{ github.workspace }}/${{ inputs.project_root }}:/home/ue4/${{ inputs.project_root }} \
          -e TEMPO_GEN_RUST_API=${{ inputs.gen_rust_api && '1' || '0' }} \
          -e TEMPO_GEN_CPP_API=${{ inputs.gen_cpp_api && '1' || '0' }} \
          tempo_unreal_image \
          /home/ue4/${{ inputs.tempo_root }}/Scripts/Build.sh
    - name: Run Automation Tests
      if: ${{ inputs.automation_test_filter != '' }}
      run: |
        docker run --rm \
          ${ENGINE_MODS_MOUNTS} \
          -v ${{ github.workspace }}/.engine-ddc-cache/Engine/DerivedDataCache:/home/ue4/UnrealEngine/Engine/DerivedDataCache \
          -v ${{ github.workspace }}/${{ inputs.project_root }}:/home/ue4/${{ inputs.project_root }} \
          -e TEMPO_SKIP_PREBUILD=1 \
          tempo_unreal_image \
          /home/ue4/${{ inputs.tempo_root }}/Scripts/Test.sh "${{ inputs.automation_test_filter }}"
    - name: Package
      if: ${{ inputs.package }}
      run: |
        PACKAGE_ARGS=""
        if [ "${{ inputs.maps != '' }}" = "true" ]; then
          PACKAGE_ARGS="$PACKAGE_ARGS -maps=${{ inputs.maps }}"
        else
          PACKAGE_ARGS="$PACKAGE_ARGS -allmaps"
        fi
        PACKAGE_ARGS="$PACKAGE_ARGS -ddc=NoZenLocalFallback" # NoZenLocalFallback causes the DDC to end up in Engine/DerivedDataCache folder
        if [ "${{ inputs.patch }}" = "true" ]; then
          PACKAGE_ARGS="$PACKAGE_ARGS -generatepatch -basedonreleaseversion=${{ inputs.release_id }} -basedonreleaseversionbasepath=/home/ue4/${{ inputs.project_root }}/Releases"
        fi
        docker run --rm \
          ${ENGINE_MODS_MOUNTS} \
          -v ${{ github.workspace }}/.engine-ddc-cache/Engine/DerivedDataCache:/home/ue4/UnrealEngine/Engine/DerivedDataCache \
          -v ${{ github.workspace }}/.releases:/home/ue4/${{ inputs.project_root }}/Releases \
          -v ${{ github.workspace }}/${{ inputs.project_root }}:/home/ue4/${{ inputs.project_root }} \
          -e TEMPO_GEN_RUST_API=${{ inputs.gen_rust_api && '1' || '0' }} \
          -e TEMPO_GEN_CPP_API=${{ inputs.gen_cpp_api && '1' || '0' }} \
          -e TEMPO_SKIP_PREBUILD=1 \
          tempo_unreal_image \
          /home/ue4/${{ inputs.tempo_root }}/Scripts/Package.sh $PACKAGE_ARGS
    - name: Extract Patch (if patching)
      if: ${{ inputs.patch }}
      run: |
        docker run --rm \
          ${ENGINE_MODS_MOUNTS} \
          -v ${{ github.workspace }}/.engine-ddc-cache/Engine/DerivedDataCache:/home/ue4/UnrealEngine/Engine/DerivedDataCache \
          -v ${{ github.workspace }}/${{ inputs.project_root }}:/home/ue4/${{ inputs.project_root }} \
          -e TEMPO_SKIP_PREBUILD=1 \
          tempo_unreal_image \
          /home/ue4//${{ inputs.tempo_root }}/Scripts/ExtractPatch.sh /home/ue4/${{ inputs.project_root }}/Packaged
    - name: Reset File Permissions
      if: always()  # This ensures it runs even if previous steps fail
      run: |
        # Reset the permissions of the project, engine mods cache, and ddc cache so that subsequent steps have access.
        sudo chown -R $(id -u):$(id -g) ${{ github.workspace }}/${{ inputs.project_root }}
        sudo chmod -R +r ${{ github.workspace }}/${{ inputs.project_root }}
        if [ -d .engine-mods-cache ]; then
          sudo chown -R $(id -u):$(id -g) .engine-mods-cache/
          sudo chmod -R +r .engine-mods-cache/
        fi
        sudo chown -R $(id -u):$(id -g) .engine-ddc-cache/
        sudo chmod -R +r .engine-ddc-cache/
    - name: Diagnose Cooked vs Temp Engine Content (post-cook)
      # Temporary diagnostic: iostore stages engine content from Saved/Temp/<Platform>, which is
      # missing on cold (cache-miss) builds. This reports whether the cook produced the engine
      # content in Saved/Cooked and/or Saved/Temp, to distinguish a cook problem from a stage problem.
      # Runs after the permissions reset (files readable by the runner) and even if Package failed.
      if: ${{ always() && inputs.package }}
      run: |
        PROJ="${{ github.workspace }}/${{ inputs.project_root }}"
        echo "=== Saved/Cooked platform dirs ==="; ls "$PROJ/Saved/Cooked" 2>/dev/null || echo "(none)"
        echo "=== Saved/Temp platform dirs ===";   ls "$PROJ/Saved/Temp" 2>/dev/null || echo "(none)"
        echo "=== WorldGridMaterial locations (Cooked + Temp) ==="
        find "$PROJ/Saved/Cooked" "$PROJ/Saved/Temp" -name 'WorldGridMaterial*' 2>/dev/null || echo "(not found in either)"
        echo "=== Engine cooked file counts per platform ==="
        for base in Cooked Temp; do
          for d in "$PROJ/Saved/$base"/*/Engine; do
            [ -d "$d" ] && echo "$d: $(find "$d" -type f 2>/dev/null | wc -l) files"
          done
        done
    - name: Upload Automation Test Report
      if: ${{ always() && inputs.automation_test_filter != '' }}
      uses: actions/upload-artifact@v4
      with:
        name: ${{ format('automation-test-report-{0}-{1}', inputs.platform, inputs.unreal_version) }}
        path: ${{ github.workspace }}/${{ inputs.project_root }}/Saved/TempoTestReport
        if-no-files-found: warn
    - name: Upload Release Artifact (if uploading a release)
      if: ${{ inputs.upload_artifact && ! inputs.patch }}
      id: upload_release
      uses: actions/upload-artifact@v4
      with:
        name: ${{ format('{0}-{1}-{2}-{3}', github.event.repository.name, inputs.platform, inputs.unreal_version, inputs.release_id) }}
        path: ${{ github.workspace }}/${{ inputs.project_root }}/Packaged
        overwrite: true
        if-no-files-found: error
        compression-level: ${{ inputs.upload_artifact_compression_level }}
    - name: Upload Patch Artifact (if uploading a patch)
      if: ${{ inputs.upload_artifact && inputs.patch }}
      id: upload_patch
      uses: actions/upload-artifact@v4
      with:
        name: ${{ format('{0}-{1}-{2}-{3}-patch', github.event.repository.name, inputs.platform, inputs.unreal_version, inputs.release_id) }}
        path: ${{ github.workspace }}/${{ inputs.project_root }}/Packaged/patch.zip
        overwrite: true
        if-no-files-found: error
        compression-level: ${{ inputs.upload_artifact_compression_level }}
    - name: Cache Engine Mods (if building cache branch and not using pre-modded image)
      if: ${{ github.event_name != 'pull_request_target' && github.ref == format('refs/heads/{0}', inputs.cache_branch) && inputs.engine_mods_image == '' }}
      uses: actions/cache/save@v4
      with:
        path: |
          .engine-mods-cache/TempoMods/**
          .engine-mods-cache/Engine/Plugins/Runtime/ZoneGraph/**
          .engine-mods-cache/Engine/Plugins/PCG/**
          .engine-mods-cache/Engine/Plugins/Editor/EditorScriptingUtilities/**
          .engine-mods-cache/Engine/Plugins/Runtime/ComputeFramework/**
          .engine-mods-cache/Engine/Plugins/AI/MassCrowd/**
          .engine-mods-cache/Engine/Plugins/Runtime/MassEntity/**
          .engine-mods-cache/Engine/Plugins/Runtime/StateTree/**
          .engine-mods-cache/Engine/Source/Programs/UnrealBuildTool/**
          .engine-mods-cache/Engine/Source/Programs/AutomationTool/**
          .engine-mods-cache/Engine/Source/Programs/Shared/**
          .engine-mods-cache/Engine/Binaries/DotNET/UnrealBuildTool/**
          .engine-mods-cache/Engine/Binaries/DotNET/AutomationTool/**
        key: tempo-engine-mods-${{ env.UNREAL_VERSION }}-${{ hashFiles(format('{0}/EngineMods/**', inputs.tempo_root)) }}
    - name: Cache Build (if building cache branch)
      if: ${{ github.event_name != 'pull_request_target' && github.ref == format('refs/heads/{0}', inputs.cache_branch) }}
      uses: actions/cache/save@v4
      with:
        path: |
          ${{ github.workspace }}/${{ inputs.project_root }}/**/*.pb.cc
          ${{ github.workspace }}/${{ inputs.project_root }}/**/*.pb.h
          ${{ github.workspace }}/${{ inputs.project_root }}/Binaries/**
          ${{ github.workspace }}/${{ inputs.project_root }}/Intermediate/**
          ${{ github.workspace }}/${{ inputs.project_root }}/DerivedDataCache/**
          ${{ github.workspace }}/${{ inputs.project_root }}/Saved/**
          ${{ github.workspace }}/${{ inputs.project_root }}/Plugins/**/Intermediate/**
          ${{ github.workspace }}/${{ inputs.project_root }}/Plugins/**/Binaries/**
          .engine-ddc-cache/**
        key: ${{ steps.repo_lowercase.outputs.REPO_LOWERCASE }}-build-${{ env.UNREAL_VERSION }}-${{ github.sha }}
    - name: Check Free Space (if using GitHub-hosted runner)
      if: ${{ contains(runner.name, 'Github') && contains(runner.name, 'Actions') }}
      run: df -h / && df -h /mnt
