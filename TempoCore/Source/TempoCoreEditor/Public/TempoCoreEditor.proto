syntax = "proto3";

import "TempoCore/Empty.proto";

message SaveLevelRequest {
  string path = 1;
  bool overwrite = 2;
}

message OpenLevelRequest {
  string path = 1;
}

service TempoCoreEditorService {
  rpc PlayInEditor(TempoCore.Empty) returns (TempoCore.Empty);

  rpc Simulate(TempoCore.Empty) returns (TempoCore.Empty);

  rpc Stop(TempoCore.Empty) returns (TempoCore.Empty);

  rpc SaveLevel(SaveLevelRequest) returns (TempoCore.Empty);

  rpc OpenLevel(OpenLevelRequest) returns (TempoCore.Empty);

  rpc NewLevel(TempoCore.Empty) returns (TempoCore.Empty);
}
