syntax = "proto3";

import "TempoCore/Empty.proto";
import "TempoCore/Geometry.proto";

message SpawnActorRequest {
  // Class name of the actor to spawn.
  string actor_type = 1;
  // If true, defer finishing the spawn until FinishSpawningActor is called.
  bool deferred = 2;
  // Spawn transform (world frame, or relative to `relative_to_actor` if set). Meters / right-handed.
  TempoCore.Transform transform = 3;
  // Optional actor name that `transform` is interpreted relative to.
  string relative_to_actor = 4;
}

message SpawnActorResponse {
  // Name of the spawned actor.
  string name = 1;
  // World transform of the spawned actor after spawning.
  TempoCore.Transform transform = 2;
}

message FinishSpawningActorRequest {
  // Name of the deferred actor to finish spawning.
  string actor = 1;
}

message FinishSpawningActorResponse {
  // World transform of the actor after finishing the spawn.
  TempoCore.Transform transform = 1;
}

message DestroyActorRequest {
  // Name of the actor to destroy.
  string actor = 1;
}

message AddComponentRequest {
  // Class name of the component to add.
  string component_type = 1;
  // Name of the owning actor.
  string actor = 2;
  // Optional name for the new component (auto-generated if empty).
  string name = 3;
  // Optional name of a parent component on the owning actor (empty = attach to root).
  string parent = 4;
  // Local transform of the new component on its parent. Meters / right-handed.
  TempoCore.Transform transform = 5;
  // Optional socket name on `parent` to attach to.
  string socket = 6;
}

message AddComponentResponse {
  // Name of the added component.
  string name = 1;
  // World transform of the component after attachment.
  TempoCore.Transform transform = 2;
}

message DestroyComponentRequest {
  // Name of the owning actor.
  string actor = 1;
  // Name of the component to destroy.
  string component = 2;
}

message SetActorTransformRequest {
  // Name of the actor to move.
  string actor = 1;
  // Target transform (world frame, or relative to `relative_to_actor` if set). Meters / right-handed.
  TempoCore.Transform transform = 2;
  // Optional actor name that `transform` is interpreted relative to.
  string relative_to_actor = 3;
}

message SetComponentTransformRequest {
  // Name of the owning actor.
  string actor = 1;
  // Name of the component to move.
  string component = 2;
  // Target transform. Meters / right-handed.
  TempoCore.Transform transform = 3;
  // If true, `transform` is in world space; otherwise it is relative to the component's parent.
  bool relative_to_world = 4;
}

message ActivateComponentRequest {
  // Name of the owning actor.
  string actor = 1;
  // Name of the component to activate.
  string component = 2;
}

message DeactivateComponentRequest {
  // Name of the owning actor.
  string actor = 1;
  // Name of the component to deactivate.
  string component = 2;
}

message ActorDescriptor {
  // Actor name.
  string name = 1;
  // Actor class name.
  string actor_type = 2;
}

message GetAllActorsResponse {
  repeated ActorDescriptor actors = 1;
}

message ComponentDescriptor {
  // Name of the owning actor.
  string actor = 1;
  // Component name.
  string name = 2;
  // Component class name.
  string component_type = 3;
}

message GetAllComponentsRequest {
  // Name of the actor whose components to list.
  string actor = 1;
}

message GetAllComponentsResponse {
  repeated ComponentDescriptor components = 1;
}

message GetActorPropertiesRequest {
  // Name of the actor to inspect.
  string actor = 1;
  // If true, also walk components' properties.
  bool include_components = 2;
}

message GetComponentPropertiesRequest {
  // Name of the owning actor.
  string actor = 1;
  // Name of the component to inspect.
  string component = 2;
}

message PropertyDescriptor {
  // Name of the owning actor.
  string actor = 1;
  // Name of the owning component (empty for actor-level properties).
  string component = 2;
  // Property name (dot-path for nested struct/array members).
  string name = 3;
  // Property type string (e.g. "bool", "int", "float[]", "vector").
  string property_type = 4;
  // Current property value, serialized as a string.
  string value = 5;
}

message GetPropertiesResponse {
  repeated PropertyDescriptor properties = 1;
}

message SetBoolPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  bool value = 4;
}

message SetStringPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  string value = 4;
}

message SetEnumPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // Enum value as its symbolic name.
  string value = 4;
}

message SetIntPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  int32 value = 4;
}

message SetInt64PropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  int64 value = 4;
}

message SetFloatPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  float value = 4;
}

message SetVectorPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  float x = 4;
  float y = 5;
  float z = 6;
}

message SetVector2DPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  float x = 4;
  float y = 5;
}

message SetIntVectorPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  int32 x = 4;
  int32 y = 5;
  int32 z = 6;
}

message SetIntPointPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  int32 x = 4;
  int32 y = 5;
}

message SetRotatorPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // Roll in radians.
  float r = 4;
  // Pitch in radians.
  float p = 5;
  // Yaw in radians.
  float y = 6;
}

message SetQuatPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // Quaternion components (right-handed convention; will be converted to Unreal's left-handed FQuat).
  float x = 4;
  float y = 5;
  float z = 6;
  float w = 7;
}

message SetTransformPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // Transform (meters / right-handed). Location is converted m -> cm and rotation rad -> deg, right-handed -> left-handed.
  TempoCore.Transform value = 4;
}

message SetColorPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // 8-bit RGB components in [0, 255].
  int32 r = 4;
  int32 g = 5;
  int32 b = 6;
}

message SetClassPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // Class path or name.
  string value = 4;
}

message SetAssetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // Asset path or name.
  string value = 4;
}

message SetActorPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // Name of the referenced actor.
  string value = 4;
}

message SetComponentPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  // Name of the referenced component (on the same actor).
  string value = 4;
}

message SetBoolArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated bool values = 4;
}

message SetStringArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetEnumArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetIntArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated int32 values = 4;
}

message SetInt64ArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated int64 values = 4;
}

message SetFloatArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated float values = 4;
}

message SetClassArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetAssetArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetActorArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetComponentArrayPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

// Set RPCs replace the entire contents of a TSet property with the provided values.
// (Duplicates among `values` collapse, matching TSet semantics.)
message SetBoolSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated bool values = 4;
}

message SetStringSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetEnumSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetIntSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated int32 values = 4;
}

message SetInt64SetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated int64 values = 4;
}

message SetFloatSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated float values = 4;
}

message SetClassSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetAssetSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetActorSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message SetComponentSetPropertyRequest {
  string actor = 1;
  string component = 2;
  string property = 3;
  repeated string values = 4;
}

message CallFunctionRequest {
  string actor = 1;
  string component = 2;
  // Name of the UFUNCTION to invoke.
  string function = 3;
}

// One operation in a SetProperties batch. The oneof selects which set-property
// operation to perform; each variant is the same Set*PropertyRequest message
// that the corresponding singular RPC accepts.
message SetPropertyOp {
  oneof op {
    SetBoolPropertyRequest bool_op = 1;
    SetIntPropertyRequest int_op = 2;
    SetInt64PropertyRequest int64_op = 3;
    SetFloatPropertyRequest float_op = 4;
    SetStringPropertyRequest string_op = 5;
    SetEnumPropertyRequest enum_op = 6;
    SetVectorPropertyRequest vector_op = 7;
    SetVector2DPropertyRequest vector2d_op = 8;
    SetIntVectorPropertyRequest int_vector_op = 9;
    SetIntPointPropertyRequest int_point_op = 10;
    SetRotatorPropertyRequest rotator_op = 11;
    SetQuatPropertyRequest quat_op = 12;
    SetTransformPropertyRequest transform_op = 13;
    SetColorPropertyRequest color_op = 14;
    SetClassPropertyRequest class_op = 15;
    SetAssetPropertyRequest asset_op = 16;
    SetActorPropertyRequest actor_op = 17;
    SetComponentPropertyRequest component_op = 18;
    SetBoolArrayPropertyRequest bool_array_op = 19;
    SetStringArrayPropertyRequest string_array_op = 20;
    SetEnumArrayPropertyRequest enum_array_op = 21;
    SetIntArrayPropertyRequest int_array_op = 22;
    SetInt64ArrayPropertyRequest int64_array_op = 23;
    SetFloatArrayPropertyRequest float_array_op = 24;
    SetClassArrayPropertyRequest class_array_op = 25;
    SetAssetArrayPropertyRequest asset_array_op = 26;
    SetActorArrayPropertyRequest actor_array_op = 27;
    SetComponentArrayPropertyRequest component_array_op = 28;
    SetBoolSetPropertyRequest bool_set_op = 29;
    SetStringSetPropertyRequest string_set_op = 30;
    SetEnumSetPropertyRequest enum_set_op = 31;
    SetIntSetPropertyRequest int_set_op = 32;
    SetInt64SetPropertyRequest int64_set_op = 33;
    SetFloatSetPropertyRequest float_set_op = 34;
    SetClassSetPropertyRequest class_set_op = 35;
    SetAssetSetPropertyRequest asset_set_op = 36;
    SetActorSetPropertyRequest actor_set_op = 37;
    SetComponentSetPropertyRequest component_set_op = 38;
  }
}

// Result for a single op in a SetProperties batch. Only failed ops are
// returned in the response; an empty `failures` list means every op succeeded.
message SetPropertyResult {
  // Zero-based index into the request's `ops` list.
  uint32 op_index = 1;
  // gRPC status code (see grpc::StatusCode); never 0 (OK) here.
  int32 code = 2;
  // Human-readable error message.
  string error = 3;
}

message SetPropertiesRequest {
  repeated SetPropertyOp ops = 1;
}

message SetPropertiesResponse {
  // One entry per failed op (in request order). Empty if all ops succeeded.
  repeated SetPropertyResult failures = 1;
}

service WorldControlService {
  rpc SpawnActor(SpawnActorRequest) returns (SpawnActorResponse);

  rpc FinishSpawningActor(FinishSpawningActorRequest) returns (FinishSpawningActorResponse);

  rpc DestroyActor(DestroyActorRequest) returns (TempoCore.Empty);

  rpc AddComponent(AddComponentRequest) returns (AddComponentResponse);

  rpc DestroyComponent(DestroyComponentRequest) returns (TempoCore.Empty);

  rpc SetActorTransform(SetActorTransformRequest) returns (TempoCore.Empty);

  rpc SetComponentTransform(SetComponentTransformRequest) returns (TempoCore.Empty);

  rpc ActivateComponent(ActivateComponentRequest) returns (TempoCore.Empty);

  rpc DeactivateComponent(DeactivateComponentRequest) returns (TempoCore.Empty);

  rpc GetAllActors(TempoCore.Empty) returns (GetAllActorsResponse);

  rpc GetAllComponents(GetAllComponentsRequest) returns (GetAllComponentsResponse);

  rpc GetActorProperties(GetActorPropertiesRequest) returns (GetPropertiesResponse);

  rpc GetComponentProperties(GetComponentPropertiesRequest) returns (GetPropertiesResponse);

  rpc SetBoolProperty(SetBoolPropertyRequest) returns (TempoCore.Empty);

  rpc SetStringProperty(SetStringPropertyRequest) returns (TempoCore.Empty);

  rpc SetEnumProperty(SetEnumPropertyRequest) returns (TempoCore.Empty);

  rpc SetIntProperty(SetIntPropertyRequest) returns (TempoCore.Empty);

  rpc SetInt64Property(SetInt64PropertyRequest) returns (TempoCore.Empty);

  rpc SetFloatProperty(SetFloatPropertyRequest) returns (TempoCore.Empty);

  rpc SetVectorProperty(SetVectorPropertyRequest) returns (TempoCore.Empty);

  rpc SetVector2DProperty(SetVector2DPropertyRequest) returns (TempoCore.Empty);

  rpc SetIntVectorProperty(SetIntVectorPropertyRequest) returns (TempoCore.Empty);

  rpc SetIntPointProperty(SetIntPointPropertyRequest) returns (TempoCore.Empty);

  rpc SetRotatorProperty(SetRotatorPropertyRequest) returns (TempoCore.Empty);

  rpc SetQuatProperty(SetQuatPropertyRequest) returns (TempoCore.Empty);

  rpc SetTransformProperty(SetTransformPropertyRequest) returns (TempoCore.Empty);

  rpc SetColorProperty(SetColorPropertyRequest) returns (TempoCore.Empty);

  rpc SetClassProperty(SetClassPropertyRequest) returns (TempoCore.Empty);

  rpc SetAssetProperty(SetAssetPropertyRequest) returns (TempoCore.Empty);

  rpc SetActorProperty(SetActorPropertyRequest) returns (TempoCore.Empty);

  rpc SetComponentProperty(SetComponentPropertyRequest) returns (TempoCore.Empty);

  rpc SetBoolArrayProperty(SetBoolArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetStringArrayProperty(SetStringArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetEnumArrayProperty(SetEnumArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetIntArrayProperty(SetIntArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetInt64ArrayProperty(SetInt64ArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetFloatArrayProperty(SetFloatArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetClassArrayProperty(SetClassArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetAssetArrayProperty(SetAssetArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetActorArrayProperty(SetActorArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetComponentArrayProperty(SetComponentArrayPropertyRequest) returns (TempoCore.Empty);

  rpc SetBoolSetProperty(SetBoolSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetStringSetProperty(SetStringSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetEnumSetProperty(SetEnumSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetIntSetProperty(SetIntSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetInt64SetProperty(SetInt64SetPropertyRequest) returns (TempoCore.Empty);

  rpc SetFloatSetProperty(SetFloatSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetClassSetProperty(SetClassSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetAssetSetProperty(SetAssetSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetActorSetProperty(SetActorSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetComponentSetProperty(SetComponentSetPropertyRequest) returns (TempoCore.Empty);

  rpc SetProperties(SetPropertiesRequest) returns (SetPropertiesResponse);

  rpc CallFunction(CallFunctionRequest) returns (TempoCore.Empty);
}

package TempoWorld;
