syntax = "proto3";

import "TempoCore/Geometry.proto";

message TagFilter {
  // Match entities tagged with any of these tags.
  repeated string any_tags = 1;
  // Match entities tagged with all of these tags.
  repeated string all_tags = 2;
  // Exclude entities tagged with any of these tags.
  repeated string none_tags = 3;
}

enum LaneRelationship {
  LR_UNKNOWN = 0;
  LR_SUCCESSOR = 1;
  LR_PREDECESSOR = 2;
  LR_NEIGHBOR = 3;
}

message LaneDataRequest {
  TagFilter tag_filter = 1;
  // Query center, in the map's coordinate frame.
  TempoCore.Vector2D center = 2;
  // Query radius in meters around `center`.
  double radius_m = 3;
}

message LaneConnection {
  // ID of the connected lane.
  int32 id = 1;
  LaneRelationship relationship = 2;
}

message LaneData {
  // Stable lane ID.
  int32 id = 1;
  repeated string tags = 2;
  // Center-line polyline in meters (map frame).
  repeated TempoCore.Vector center_points = 3;
  // Lane width in meters.
  double width_m = 4;
  repeated LaneConnection connections = 5;
}

message LaneDataResponse {
  repeated LaneData lanes = 1;
}

message ZoneDataRequest {
  TagFilter tag_filter = 1;
  // Query center, in the map's coordinate frame.
  TempoCore.Vector center = 2;
  // Query radius in meters around `center`.
  double radius_m = 3;
}

message ZoneConnection {
  // ID of the connected zone.
  int32 id = 1;
}

message ZoneData {
  // Stable zone ID.
  int32 id = 1;
  repeated string tags = 2;
  // Zone boundary polyline in meters (map frame).
  repeated TempoCore.Vector boundary_points = 3;
  repeated ZoneConnection connections = 4;
}

message ZoneDataResponse {
  repeated ZoneData zones = 1;
}

enum LaneAccessibility {
  LA_UNKNOWN = 0;
  LA_GREEN = 1;
  LA_YELLOW = 2;
  LA_RED = 3;
  LA_STOP_SIGN = 4;
  LA_YIELD_SIGN = 5;
  LA_NO_TRAFFIC_CONTROL = 6;
}

message LaneAccessibilityRequest {
  // Source lane ID.
  int32 from_id = 1;
  // Destination lane ID.
  int32 to_id = 2;
}

message LaneAccessibilityResponse {
  LaneAccessibility accessibility = 1;
}

service MapQueryService {
  rpc GetLanes(LaneDataRequest) returns (LaneDataResponse);

  rpc GetLaneAccessibility(LaneAccessibilityRequest) returns (LaneAccessibilityResponse);

  rpc StreamLaneAccessibility(LaneAccessibilityRequest) returns (stream LaneAccessibilityResponse);

  rpc GetZones(ZoneDataRequest) returns (ZoneDataResponse);
}

package TempoAgents;
