# Copyright Tempo Simulation, LLC. All Rights Reserved

[package]
name = "tempo-sim"
version = "0.1.0"
edition = "2021"
description = "Rust client API for the Tempo simulation server. Generated gRPC wrappers with sync and async surfaces."
license = "Apache-2.0"
repository = "https://github.com/aurum-ai/Tempo"
documentation = "https://docs.rs/tempo-sim"
keywords = ["grpc", "tonic", "tempo", "simulation", "client"]
categories = ["api-bindings", "asynchronous"]

# Explicit include so generated files (which .gitignore excludes) ship in the .crate.
# proto/ ships for debuggability / reflection use cases even though the source is pre-compiled.
include = [
    "Cargo.toml",
    "LICENSE",
    "src/**/*.rs",
    "proto/**/*.proto",
]

[dependencies]
tonic = "0.13"
prost = "0.13"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }
tokio-stream = "0.1"
thiserror = "2.0"
once_cell = "1.19"
http = "1.0"
