[package]
name = "tempo-sim"
version = "0.1.0"
edition = "2021"
description = "Rust client API for Tempo simulation"
license = "Proprietary"

# Explicit include so generated files (which .gitignore excludes) ship in the .crate.
include = [
    "Cargo.toml",
    "build.rs",
    "src/**/*.rs",
    "proto/**/*.proto",
]

[dependencies]
tonic = "0.12"
prost = "0.13"
tokio = { version = "1", features = ["rt-multi-thread", "sync", "macros", "time"] }
tokio-stream = "0.1"
thiserror = "2.0"
once_cell = "1.19"
http = "1.0"

[build-dependencies]
tonic-build = "0.12"
walkdir = "2"
protoc-bin-vendored = "3"
