[CoreRedirects]
; TempoTime, TempoScripting, and TempoCoreShared collapsed into TempoCore in v2.
; PackageRedirects let existing user assets resolve UClasses/UStructs that
; previously lived in those modules without requiring re-saves.
+PackageRedirects=(OldName="/Script/TempoTime",NewName="/Script/TempoCore")
+PackageRedirects=(OldName="/Script/TempoScripting",NewName="/Script/TempoCore")
+PackageRedirects=(OldName="/Script/TempoCoreShared",NewName="/Script/TempoCore")

; v2 also dropped the "Scripting" prefix from server-related settings
; (ScriptingPort -> ServerPort, ScriptingCompressionLevel -> ServerCompressionLevel,
; EScriptingCompressionLevel -> EServerCompressionLevel). These redirects keep
; existing user configs and assets resolving without manual edits.
+PropertyRedirects=(OldName="/Script/TempoCore.TempoCoreSettings.ScriptingPort",NewName="/Script/TempoCore.TempoCoreSettings.ServerPort")
+PropertyRedirects=(OldName="/Script/TempoCore.TempoCoreSettings.ScriptingCompressionLevel",NewName="/Script/TempoCore.TempoCoreSettings.ServerCompressionLevel")
+EnumRedirects=(OldName="/Script/TempoCore.EScriptingCompressionLevel",NewName="/Script/TempoCore.EServerCompressionLevel")

; ATempoTimeWorldSettings was collapsed into its only subclass, ATempoWorldSettings.
; This redirect keeps existing user maps/assets that referenced the old class resolving.
+ClassRedirects=(OldName="/Script/TempoCore.TempoTimeWorldSettings",NewName="/Script/TempoCore.TempoWorldSettings")
