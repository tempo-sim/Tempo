[pytest]
# Markers double as the fan-out groups: CI runs one job per marker (see
# .github/workflows/test_packaged.yml), each launching its own packaged sim.
markers =
    contract: API-surface checks that need only the installed tempo_sim wheel (no running sim).
    core: TempoCore time/control API against the packaged sim.
    world: TempoWorld actor/state/property API against the packaged sim.
    movement: TempoMovement command API against the packaged sim.
    sensors: TempoSensors data APIs. Needs a GPU + TEMPO_SIM_RENDER=1; excluded from the default CI matrix.
addopts = -ra --strict-markers
